<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #000; color: white; height: 100vh; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; }
        .header h1 { font-size: 20px; margin-bottom: 5px; }
        .video-container { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #reader { width: 100%; height: 100%; }
        .overlay { position: absolute; width: 80%; height: 40%; border: 3px solid #00ff00; border-radius: 10px; pointer-events: none; box-shadow: 0 0 20px rgba(0, 255, 0, 0.5); }
        .last-scan { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); padding: 10px 15px; border-radius: 5px; border: 1px solid #00ff00; font-family: monospace; font-size: 12px; color: #00ff00; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #1a1a1a; }
        .stat { background: #222; padding: 10px; border-radius: 5px; text-align: center; border: 1px solid #00ff00; }
        .stat-label { font-size: 11px; color: #999; }
        .stat-value { font-size: 24px; font-weight: bold; color: #00ff00; }
        .controls { padding: 10px; background: #1a1a1a; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; background: #00ff00; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        button:hover { background: #00cc00; }
        button.stop { background: #ff0000; color: white; }
        button.stop:hover { background: #cc0000; }
        .inventory-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column; z-index: 1000; }
        .inventory-modal.active { display: flex; }
        .modal-content { flex: 1; overflow-y: auto; padding: 15px; }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        .item { background: #222; padding: 10px; margin-bottom: 8px; border-left: 3px solid #00ff00; display: flex; justify-content: space-between; align-items: center; border-radius: 3px; }
        .item-code { font-family: monospace; font-size: 12px; }
        .item-count { font-size: 18px; font-weight: bold; color: #00ff00; min-width: 30px; text-align: center; }
        .btn-action { padding: 5px 8px; background: #ff0000; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .modal-footer { padding: 10px; display: flex; gap: 10px; }
        .modal-footer button { flex: 1; }
        .empty { text-align: center; color: #666; padding: 30px; }
        .flash { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #00ff00; color: #000; padding: 10px 20px; border-radius: 5px; font-weight: bold; z-index: 2000; animation: slide 3s forwards; }
        @keyframes slide { 0% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 BARCODE SCANNER</h1>
            <p>Point camera at barcode</p>
        </div>

        <div class="video-container">
            <div id="reader"></div>
            <div class="overlay"></div>
            <div class="last-scan" id="lastScan" style="display: none;">Last: <span id="lastCode"></span></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Unique Parts</div>
                <div class="stat-value" id="uniqueCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total Items</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startScanner()">▶️ START SCANNER</button>
            <button id="viewBtn" onclick="viewInventory()" style="display: none;">📋 VIEW</button>
            <button id="stopBtn" onclick="stopScanner()" class="stop" style="display: none;">⏹️ STOP</button>
        </div>
    </div>

    <div class="inventory-modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">📦 Scanned Items</div>
            <div id="itemsList"></div>
        </div>
        <div class="modal-footer">
            <button onclick="exportCSV()">📥 Export CSV</button>
            <button onclick="closeModal()" style="background: #999;">❌ Close</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
    <script>
        let inventory = JSON.parse(localStorage.getItem('inventory') || '{}');
        let scanner = null;
        let isScanning = false;
        let lastCode = '';

        function startScanner() {
            if (isScanning) return;
            isScanning = true;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('viewBtn').style.display = 'block';

            scanner = new Html5QrcodeScanner('reader', {
                fps: 10,
                qrbox: { width: 300, height: 300 }
            }, false);

            scanner.render(onScanSuccess, onScanError);
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning || decodedText === lastCode) return;

            lastCode = decodedText;
            
            if (inventory[decodedText]) {
                inventory[decodedText]++;
            } else {
                inventory[decodedText] = 1;
            }

            saveData();
            updateStats();
            showFlash(`✓ ${decodedText}`);

            document.getElementById('lastScan').style.display = 'block';
            document.getElementById('lastCode').textContent = decodedText;

            setTimeout(() => {
                lastCode = '';
            }, 1000);
        }

        function onScanError(error) {
            // Silently ignore scanning errors
        }

        function stopScanner() {
            if (!isScanning) return;
            isScanning = false;
            
            if (scanner) {
                scanner.clear();
                scanner = null;
            }

            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('viewBtn').style.display = 'none';
            document.getElementById('lastScan').style.display = 'none';
        }

        function updateStats() {
            const unique = Object.keys(inventory).length;
            const total = Object.values(inventory).reduce((a, b) => a + b, 0);
            document.getElementById('uniqueCount').textContent = unique;
            document.getElementById('totalCount').textContent = total;
        }

        function viewInventory() {
            let html = '';
            if (Object.keys(inventory).length === 0) {
                html = '<div class="empty">No items scanned yet</div>';
            } else {
                Object.entries(inventory).forEach(([code, count]) => {
                    html += `
                        <div class="item">
                            <div class="item-code">${code}</div>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <button class="btn-action" onclick="decreaseItem('${code}')">−</button>
                                <span class="item-count">${count}</span>
                                <button class="btn-action" onclick="deleteItem('${code}')">✕</button>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('itemsList').innerHTML = html;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function decreaseItem(code) {
            if (inventory[code] > 1) {
                inventory[code]--;
            } else {
                deleteItem(code);
            }
            saveData();
            updateStats();
            viewInventory();
        }

        function deleteItem(code) {
            delete inventory[code];
            saveData();
            updateStats();
            viewInventory();
        }

        function exportCSV() {
            let csv = 'Part Number,Quantity\n';
            Object.entries(inventory).forEach(([code, count]) => {
                csv += `"${code}",${count}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'inventory.csv';
            a.click();
            showFlash('✓ Exported');
        }

        function showFlash(msg) {
            const flash = document.createElement('div');
            flash.className = 'flash';
            flash.textContent = msg;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 3000);
        }

        function saveData() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
        }

        function loadData() {
            inventory = JSON.parse(localStorage.getItem('inventory') || '{}');
            updateStats();
        }

        loadData();
    </script>
</body>
</html>
